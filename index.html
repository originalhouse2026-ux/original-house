<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original House</title>

<!-- HEADER -->
<header class="header">
    <div class="header-container">

        <div id="logo-container" class="logo-container">
            <img src="logo-house.png" id="logo-img">
        </div>

        <img src="titulo-graffiti.png" id="titulo-imagen-web">

        <p class="brand-subtitle">
            250g Catar Fabric • Premium Heavy-Weight Oversize
        </p>

    </div>
</header>

<!-- FILTROS -->
<section class="filters-section">
    <div class="filters-container">
        <button class="filter-btn active" data-filter="all">All Products</button>
        <button class="filter-btn" data-filter="caps">Caps</button>
        <button class="filter-btn" data-filter="t-shirts">T-shirts</button>
        <button class="filter-btn" data-filter="outfits">Outfits</button>
    </div>
</section>

<!-- PRODUCTOS -->
<main class="products-container">
    <div class="products-grid" id="products-grid"></div>

    <div class="loading" id="loading">Loading...</div>
    <div class="error" id="error"></div>
